naftiko: 1.0.0-alpha2
info:
  label: Integry API
  description: 'Integry API. 6 operations. Lead operation: List apps. Self-contained Naftiko capability covering one Integry
    business surface.'
  tags:
  - Integry
  - Integry API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INTEGRY_API_KEY: INTEGRY_API_KEY
capability:
  consumes:
  - type: http
    namespace: integry
    baseUri: https://api.integry.io
    description: Integry API business capability. Self-contained, no shared references.
    resources:
    - name: apps-list
      path: /apps/list
      operations:
      - name: listapps
        method: POST
        description: List apps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: apps-app_name-get
      path: /apps/{app_name}/get
      operations:
      - name: getapp
        method: POST
        description: Get app
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: app_name
          in: path
          type: string
          required: true
    - name: functions-list
      path: /functions/list
      operations:
      - name: listfunctions
        method: POST
        description: List functions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: functions-predict
      path: /functions/predict
      operations:
      - name: predictfunctions
        method: POST
        description: Predict functions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: functions-function_name-call
      path: /functions/{function_name}/call
      operations:
      - name: callfunction
        method: POST
        description: Call function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: function_name
          in: path
          type: string
          required: true
    - name: functions-function_name-get
      path: /functions/{function_name}/get
      operations:
      - name: getfunction
        method: POST
        description: Get function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: function_name
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: App-Key
      value: '{{env.INTEGRY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: integry-rest
    port: 8080
    description: REST adapter for Integry API. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/apps/list
      name: apps-list
      description: REST surface for apps-list.
      operations:
      - method: POST
        name: listapps
        description: List apps
        call: integry.listapps
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/apps/{app-name}/get
      name: apps-app-name-get
      description: REST surface for apps-app_name-get.
      operations:
      - method: POST
        name: getapp
        description: Get app
        call: integry.getapp
        with:
          app_name: rest.app_name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/functions/list
      name: functions-list
      description: REST surface for functions-list.
      operations:
      - method: POST
        name: listfunctions
        description: List functions
        call: integry.listfunctions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/functions/predict
      name: functions-predict
      description: REST surface for functions-predict.
      operations:
      - method: POST
        name: predictfunctions
        description: Predict functions
        call: integry.predictfunctions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/functions/{function-name}/call
      name: functions-function-name-call
      description: REST surface for functions-function_name-call.
      operations:
      - method: POST
        name: callfunction
        description: Call function
        call: integry.callfunction
        with:
          function_name: rest.function_name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/functions/{function-name}/get
      name: functions-function-name-get
      description: REST surface for functions-function_name-get.
      operations:
      - method: POST
        name: getfunction
        description: Get function
        call: integry.getfunction
        with:
          function_name: rest.function_name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: integry-mcp
    port: 9090
    transport: http
    description: MCP adapter for Integry API. One tool per consumed operation, routed inline through this capability's consumes
      block.
    tools:
    - name: list-apps
      description: List apps
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: integry.listapps
      outputParameters:
      - type: object
        mapping: $.
    - name: get-app
      description: Get app
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: integry.getapp
      with:
        app_name: tools.app_name
      outputParameters:
      - type: object
        mapping: $.
    - name: list-functions
      description: List functions
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: integry.listfunctions
      outputParameters:
      - type: object
        mapping: $.
    - name: predict-functions
      description: Predict functions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: integry.predictfunctions
      outputParameters:
      - type: object
        mapping: $.
    - name: call-function
      description: Call function
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: integry.callfunction
      with:
        function_name: tools.function_name
      outputParameters:
      - type: object
        mapping: $.
    - name: get-function
      description: Get function
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: integry.getfunction
      with:
        function_name: tools.function_name
      outputParameters:
      - type: object
        mapping: $.
